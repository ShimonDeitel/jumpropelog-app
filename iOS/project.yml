name: Jumpropelog
options:
  bundleIdPrefix: com.shimondeitel.jumpropelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Jumpropelog:
    type: application
    platform: iOS
    sources:
      - path: Jumpropelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.jumpropelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Jumpropelog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  JumpropelogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: JumpropelogTests
      - path: Jumpropelog.storekit
    dependencies:
      - target: Jumpropelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.jumpropelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  JumpropelogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: JumpropelogUITests
    dependencies:
      - target: Jumpropelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.jumpropelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Jumpropelog:
    build:
      targets:
        Jumpropelog: all
        JumpropelogTests: [test]
        JumpropelogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Jumpropelog.storekit
    test:
      config: Debug
      storeKitConfiguration: Jumpropelog.storekit
      targets:
        - JumpropelogTests
        - JumpropelogUITests
    archive:
      config: Release
